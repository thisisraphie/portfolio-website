     pages/blog.html
════════════════════════════════════ -->
<section class="page active" id="blog">
  <div class="page-header">
    <div class="page-eyebrow">Journal</div>
    <h1 class="page-title">My <em>Blog</em></h1>
    <div class="page-divider"></div>
    <p class="page-subtitle">Thoughts, photos, and stories from my world.</p>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="toggleBlogForm()">+ New Post</button>
  </div>

  <!-- Add Blog Form -->
  <div class="add-blog-form" id="blog-form">
    <div class="form-group" style="margin-bottom:16px;">
      <label>Upload Photo</label>
      <input type="file" id="blog-img" accept="image/*" />
    </div>
    <div class="form-group" style="margin-bottom:24px;">
      <label>Caption</label>
      <textarea id="blog-caption" placeholder="Tell the story behind this photo..."></textarea>
    </div>
    <div class="inline-flex">
      <button class="btn btn-primary" onclick="addBlogPost()">Publish Post</button>
      <button class="btn btn-ghost" onclick="toggleBlogForm()">Cancel</button>
    </div>
  </div>

  <!-- Blog Cards -->
  <div class="blog-grid" id="blog-grid">
    <!-- Sample post — delete this when you add your own -->
    <div class="blog-card">
      <button class="delete-btn" onclick="this.closest('.blog-card').remove()">✕</button>
      <div class="blog-img-placeholder">📸</div>
      <div class="blog-body">
        <div class="blog-date">April 2026</div>
        <div class="blog-caption">Your first blog post. Upload a photo and write your story using the button above.</div>
      </div>
    </div>
  </div>
</section>
