<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rafi</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ── SIDEBAR ── -->
<nav class="sidebar">
  <div class="sidebar-logo">
    <div class="initials">Raphie</div>
    <div class="tagline">Portfolio</div>
  </div>

  <button class="nav-link active" onclick="showPage('dashboard', this)">
    <span class="nav-icon">◈</span>
    <span>Dashboard</span>
  </button>
  <button class="nav-link" onclick="showPage('projects', this)">
    <span class="nav-icon">◫</span>
    <span>Projects</span>
  </button>
  <button class="nav-link" onclick="showPage('blog', this)">
    <span class="nav-icon">◱</span>
    <span>Blog</span>
  </button>
  <button class="nav-link" onclick="showPage('contact', this)">
    <span class="nav-icon">◎</span>
    <span>Contact</span>
  </button>

  <div class="sidebar-footer">
    © <span id="year"></span> · Portfolio
  </div>
</nav>

<!-- ── MAIN — pages are injected here ── -->
<main class="main">
  <div id="page-container"></div>
</main>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  const cache = {};

  // Load a page's HTML from /pages/ and inject it
  async function showPage(id, btn) {
    // Update nav active state
    document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
    btn.classList.add('active');

    // Show cached version instantly if available
    const container = document.getElementById('page-container');

    if (cache[id]) {
      container.innerHTML = cache[id];
      initPage(id);
      return;
    }

    // Fetch the page fragment
    try {
      const res  = await fetch(`pages/${id}.html`);
      const html = await res.text();
      cache[id]  = html;
      container.innerHTML = html;
      initPage(id);
    } catch (err) {
      container.innerHTML = `
        <div style="padding:60px 64px;color:var(--muted);font-family:'DM Mono',monospace;font-size:0.8rem;">
          ⚠ Could not load page. Make sure you're running this through a local server
          (e.g. VS Code Live Server, or <code>python -m http.server</code>).
        </div>`;
    }
  }

  // Page-specific JS that runs after a page is injected into the DOM
  function initPage(id) {
    if (id === 'projects') initProjects();
    if (id === 'blog')     initBlog();
  }

  // ── Projects logic ──────────────────────────────────────────
  function initProjects() {
    window.toggleProjectForm = () => {
      document.getElementById('project-form').classList.toggle('open');
    };

    window.addProject = () => {
      const title   = document.getElementById('proj-title').value.trim();
      const link    = document.getElementById('proj-link').value.trim();
      const desc    = document.getElementById('proj-desc').value.trim();
      const imgFile = document.getElementById('proj-img').files[0];

      if (!title) { alert('Please enter a project title.'); return; }

      const card = document.createElement('div');
      card.className = 'project-card';

      const render = (imgSrc) => {
        card.innerHTML = `
          <button class="delete-btn" onclick="this.closest('.project-card').remove()">✕</button>
          ${imgSrc
            ? `<img class="project-img" src="${imgSrc}" alt="${title}" />`
            : `<div class="project-img-placeholder">🖼</div>`}
          <div class="project-body">
            <div class="project-title">${title}</div>
            <div class="project-desc">${desc || 'No description provided.'}</div>
            ${link ? `<a class="project-link" href="${link}" target="_blank">↗ View Project</a>` : ''}
          </div>`;
        document.getElementById('projects-grid').prepend(card);
        ['proj-title','proj-link','proj-desc'].forEach(i => document.getElementById(i).value = '');
        document.getElementById('proj-img').value = '';
        toggleProjectForm();
      };

      if (imgFile) {
        const reader = new FileReader();
        reader.onload = e => render(e.target.result);
        reader.readAsDataURL(imgFile);
      } else {
        render(null);
      }
    };
  }

  // ── Blog logic ───────────────────────────────────────────────
  function initBlog() {
    window.toggleBlogForm = () => {
      document.getElementById('blog-form').classList.toggle('open');
    };

    window.addBlogPost = () => {
      const caption = document.getElementById('blog-caption').value.trim();
      const imgFile = document.getElementById('blog-img').files[0];

      if (!caption && !imgFile) { alert('Please add a photo or caption.'); return; }

      const dateStr = new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      const card = document.createElement('div');
      card.className = 'blog-card';

      const render = (imgSrc) => {
        card.innerHTML = `
          <button class="delete-btn" onclick="this.closest('.blog-card').remove()">✕</button>
          ${imgSrc
            ? `<img class="blog-img" src="${imgSrc}" alt="Blog post" />`
            : `<div class="blog-img-placeholder">📸</div>`}
          <div class="blog-body">
            <div class="blog-date">${dateStr}</div>
            <div class="blog-caption">${caption || ''}</div>
          </div>`;
        document.getElementById('blog-grid').prepend(card);
        document.getElementById('blog-caption').value = '';
        document.getElementById('blog-img').value = '';
        toggleBlogForm();
      };

      if (imgFile) {
        const reader = new FileReader();
        reader.onload = e => render(e.target.result);
        reader.readAsDataURL(imgFile);
      } else {
        render(null);
      }
    };
  }

  // Load dashboard on startup
  showPage('dashboard', document.querySelector('.nav-link'));
</script>
</body>
</html>
